# Adversarial thrash harness. A realistic distributed topology under attack:
#   - one central COLLECTOR (RBAC, k-anon, ledger, benchmark, broker)
#   - three EDGE GATEWAYS across two orgs (acme-eu with compression on, acme-tiny for k-anon, globex-eu)
#   - an ATTACK DRIVER that seeds real model traffic (Anthropic + Gemini + OpenAI, all live) then tries
#     to break every guarantee: auth, RBAC, tenant/org isolation, privacy, cost integrity, k-anon,
#     compression safety, exact-cache scoping, transport hardening, the collaboration org wall.
#
# Run from the repo root:
#   ANTHROPIC_API_KEY=... OPENAI_API_KEY=... GEMINI_API_KEY=... \
#     docker compose -f examples/attack-e2e/docker-compose.yml up --build \
#     --abort-on-container-exit --exit-code-from attack-driver
# Exit code is the number of gaps found (0 = every invariant held).

x-image: &image
  build: {context: ../.., dockerfile: examples/attack-e2e/Dockerfile}

x-common-env: &common-env
  ABEN_HMAC_KEY: ${ABEN_HMAC_KEY:-attack-e2e-hmac-secret}
  ABEN_INGEST_TOKEN: ${ABEN_INGEST_TOKEN:-attack-ingest-token}
  ABEN_KG: /config/kg.yaml
  ABEN_K_ANON: "3"
  ABEN_NOTIFY: "0"
  PYTHONUNBUFFERED: "1"

x-gateway-env: &gateway-env
  <<: *common-env
  ABEN_COLLECTOR_URL: http://collector:8090
  ABEN_ANTHROPIC_UPSTREAM: https://api.anthropic.com
  ABEN_GOOGLE_UPSTREAM: https://generativelanguage.googleapis.com
  ABEN_OPENAI_UPSTREAM: https://api.openai.com
  ABEN_EXACT_CACHE: "1"
  ABEN_DB: /tmp/edge.db
  ABEN_LOCAL_DB: /tmp/local.db
  ABEN_MATCH_DB: /tmp/m.db

services:
  collector:
    <<: *image
    command: ["python", "-m", "uvicorn", "abenlux.api.server:app", "--host", "0.0.0.0", "--port", "8090"]
    environment:
      <<: *common-env
      ABEN_PRINCIPALS: /config/principals.yaml
      ABEN_DB: /tmp/central.db
      ABEN_LEDGER_DB: /tmp/ledger.db
      ABEN_TENANT_DB: /tmp/tenants.db
      ABEN_MATCH_DB: /tmp/matches.db
      ABEN_CONTACT_DB: /tmp/contacts.db
    volumes: ["../multi-dev-e2e/config:/config:ro"]
    healthcheck: {test: ["CMD", "curl", "-fsS", "http://localhost:8090/health"], interval: 2s, timeout: 3s, retries: 30}

  gw-acme-eu:
    <<: *image
    command: ["python", "-m", "uvicorn", "abenlux.capture.gateway:app", "--host", "0.0.0.0", "--port", "8088"]
    environment: {<<: *gateway-env, ABEN_TENANT: acme-eu, ABEN_RESIDENCY: eu, ABEN_COMPRESS: all}
    volumes: ["../multi-dev-e2e/config:/config:ro"]
    depends_on: {collector: {condition: service_healthy}}
    healthcheck: {test: ["CMD", "curl", "-fsS", "http://localhost:8088/health"], interval: 2s, timeout: 3s, retries: 30}

  gw-acme-tiny:
    <<: *image
    command: ["python", "-m", "uvicorn", "abenlux.capture.gateway:app", "--host", "0.0.0.0", "--port", "8088"]
    environment: {<<: *gateway-env, ABEN_TENANT: acme-tiny, ABEN_RESIDENCY: eu}
    volumes: ["../multi-dev-e2e/config:/config:ro"]
    depends_on: {collector: {condition: service_healthy}}
    healthcheck: {test: ["CMD", "curl", "-fsS", "http://localhost:8088/health"], interval: 2s, timeout: 3s, retries: 30}

  gw-globex-eu:
    <<: *image
    command: ["python", "-m", "uvicorn", "abenlux.capture.gateway:app", "--host", "0.0.0.0", "--port", "8088"]
    environment: {<<: *gateway-env, ABEN_TENANT: globex-eu, ABEN_RESIDENCY: eu}
    volumes: ["../multi-dev-e2e/config:/config:ro"]
    depends_on: {collector: {condition: service_healthy}}
    healthcheck: {test: ["CMD", "curl", "-fsS", "http://localhost:8088/health"], interval: 2s, timeout: 3s, retries: 30}

  attack-driver:
    <<: *image
    command: ["python", "-u", "attack_driver.py"]
    environment:
      <<: *common-env
      ABEN_COLLECTOR_URL: http://collector:8090
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      collector: {condition: service_healthy}
      gw-acme-eu: {condition: service_healthy}
      gw-acme-tiny: {condition: service_healthy}
      gw-globex-eu: {condition: service_healthy}
